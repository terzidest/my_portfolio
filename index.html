<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Anti-FOUC: set the dark class before first paint. Absence of the
         stored key means "follow the system preference". -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || (t === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio of Triantaphilos Terzides — frontend engineer based in Athens, building production React applications for web and mobile." />
    <!-- Site-wide social-share tags. Social crawlers don't execute JS, so
         these static defaults are what every shared link shows; per-route
         title/description/canonical are handled in JS by usePageMeta. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Triantaphilos Terzides" />
    <meta property="og:title" content="Triantaphilos Terzides | Frontend Engineer" />
    <meta property="og:description" content="Portfolio of Triantaphilos Terzides — frontend engineer based in Athens, building production React applications for web and mobile." />
    <meta property="og:url" content="https://terzidest.netlify.app/" />
    <meta property="og:image" content="https://terzidest.netlify.app/assets/images/projects/portfolio.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Triantaphilos Terzides | Frontend Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
